<!DOCTYPE html>
<html>
<head>
    <script>
        var path = window.location.pathname;
        var lowerCasePath = path.toLowerCase();
        if (path !== lowerCasePath) {
            window.location.replace(window.location.origin + lowerCasePath);
        }
    </script>
</head>
<body>
    <p>Site loading...</p>
</body>
</html>
